<body class="page page-contact">

  <header class="nav-wrap">
    <nav class="nav-pill">
      <a class="nav-logo" href="/" aria-label="Home">
        <img src="/assets/images/avatar-yohan-2.png" alt="Yohan" width="32" height="32"

      <div class="nav-links">

  <main>

    <section class="page-hero">

            <span class="contact-arrow">→</span>

          <a class="contact-card" href="https://t.me/web3yohan" target="_blank" rel="noreferrer">
            <div class="contact-icon">✈</div>
            <div class="contact-info">
              <span class="contact-platform">DM in Telegram</span>
              <span class="contact-handle">@web3yohan</span>
            </div>
            <span class="contact-arrow">→</span>
          </a>

          <a class="contact-card" href="mailto:web3yohan@gmail.com">
            <div class="contact-icon">@</div>
            <div class="contact-info">
              <span class="contact-platform">Send an Email</span>
              <span class="contact-handle">web3yohan@gmail.com</span>
            </div>
